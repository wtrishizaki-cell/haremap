<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --pk:#FF1493;--pk2:#d60f7d;--pk-bg:rgba(255,20,147,.07);
  --bg:#fff;--bg2:#f8f8f8;--bg3:#f1f1f1;
  --bd:#e5e5e5;--bd2:#cecece;
  --t1:#111;--t2:#555;--t3:#999;
  --sh:0 2px 12px rgba(0,0,0,.06);--sh-h:0 6px 24px rgba(0,0,0,.12);
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--t1);font-family:'Montserrat','Noto Sans JP',sans-serif;-webkit-font-smoothing:antialiased}
a{text-decoration:none;color:inherit}
button{cursor:pointer;font-family:inherit}

/* NAV */
.nav{position:sticky;top:0;z-index:200;background:rgba(255,255,255,.97);backdrop-filter:blur(12px);border-bottom:1px solid var(--bd)}
.nav-inner{max-width:1200px;margin:0 auto;padding:0 20px;height:56px;display:flex;align-items:center;gap:16px}
.nav-logo{font-size:19px;font-weight:700;letter-spacing:.06em;white-space:nowrap;flex-shrink:0}
.nav-logo span{color:var(--pk)}
.nav-search{flex:1;max-width:440px;display:flex;border:1.5px solid var(--bd2);border-radius:6px;overflow:hidden;background:#fff}
.nav-search input{flex:1;border:none;padding:0 14px;font-size:13px;color:var(--t1);font-family:inherit;outline:none}
.nav-search input::placeholder{color:var(--t3)}
.nav-search button{padding:0 18px;background:var(--pk);border:none;color:#fff;font-size:11px;font-weight:700;letter-spacing:.1em;transition:background .2s;flex-shrink:0}
.nav-search button:hover{background:var(--pk2)}

/* HERO */
.hero{background:linear-gradient(160deg,#fff 0%,#fff5fa 60%,#ffe0ef 100%);padding:56px 20px 44px;text-align:center;border-bottom:1px solid var(--bd)}
.hero-eyebrow{display:inline-block;font-size:10px;letter-spacing:.42em;color:var(--pk);border:1px solid rgba(255,20,147,.3);padding:5px 18px;margin-bottom:22px;border-radius:2px}
.hero h1{font-size:clamp(26px,6vw,48px);font-weight:700;letter-spacing:.03em;margin-bottom:12px;line-height:1.2}
.hero h1 em{color:var(--pk);font-style:normal}
.hero-desc{font-size:13px;color:var(--t2);letter-spacing:.05em;margin-bottom:32px;line-height:1.9}
.hero-box{max-width:520px;margin:0 auto 24px;display:flex;border:1.5px solid var(--bd2);border-radius:8px;overflow:hidden;background:#fff;box-shadow:var(--sh)}
.hero-box input{flex:1;border:none;padding:14px 20px;font-size:13px;color:var(--t1);font-family:inherit;outline:none}
.hero-box input::placeholder{color:var(--t3)}
.hero-box button{padding:0 28px;background:var(--pk);border:none;color:#fff;font-size:12px;font-weight:700;letter-spacing:.1em;transition:background .2s;white-space:nowrap}
.hero-box button:hover{background:var(--pk2)}
.cat-row{display:flex;flex-wrap:wrap;gap:8px;justify-content:center}
.cat-pill{padding:7px 16px;border-radius:20px;background:#fff;border:1.5px solid var(--bd2);color:var(--t2);font-size:11px;font-weight:500;letter-spacing:.06em;transition:all .18s}
.cat-pill:hover{border-color:var(--pk);color:var(--pk)}
.cat-pill.on{background:var(--pk);border-color:var(--pk);color:#fff}

/* AREA NAV */
.area-nav{background:#fff;border-bottom:1px solid var(--bd);padding:10px 20px;overflow-x:auto;position:sticky;top:56px;z-index:100}
.area-nav::-webkit-scrollbar{display:none}
.area-nav-inner{max-width:1200px;margin:0 auto;display:flex;align-items:center;gap:6px;white-space:nowrap}
.area-label{font-size:9px;letter-spacing:.25em;color:var(--t3);text-transform:uppercase;margin-right:4px;flex-shrink:0}
.area-pill{padding:5px 13px;border-radius:16px;background:transparent;border:1.5px solid var(--bd);color:var(--t3);font-size:11px;letter-spacing:.04em;transition:all .18s;flex-shrink:0}
.area-pill:hover{border-color:var(--pk);color:var(--pk)}
.area-pill.on{background:var(--pk-bg);border-color:var(--pk);color:var(--pk);font-weight:600}

/* STATS */
.stats-strip{background:var(--bg2);border-bottom:1px solid var(--bd);padding:18px 20px;display:flex;justify-content:center;gap:48px;flex-wrap:wrap}
.sstat{text-align:center;min-width:56px}
.sstat-n{font-size:26px;font-weight:700;line-height:1;margin-bottom:4px;color:var(--t1)}
.sstat-n.p{color:var(--pk)}
.sstat-l{font-size:9px;letter-spacing:.22em;color:var(--t3);text-transform:uppercase}

/* SPONSOR BAND */
.sponsor-band{background:var(--t1);padding:20px;border-bottom:1px solid #222}
.sponsor-inner{max-width:1200px;margin:0 auto}
.sponsor-label{font-size:9px;letter-spacing:.4em;color:#666;text-transform:uppercase;margin-bottom:12px}
.sponsor-row{display:flex;gap:16px;flex-wrap:wrap;align-items:center}
.sponsor-card{background:#1a1a1a;border:1px solid #333;padding:12px 20px;display:flex;align-items:center;gap:12px;transition:border-color .2s;border-radius:4px}
.sponsor-card:hover{border-color:var(--pk)}
.sponsor-name{font-size:12px;font-weight:600;color:#fff;letter-spacing:.04em}
.sponsor-cat{font-size:9px;color:#666;letter-spacing:.1em;margin-top:2px}
.sponsor-badge{font-size:8px;letter-spacing:.18em;padding:2px 8px;background:var(--pk);color:#fff;border-radius:2px;flex-shrink:0}

/* MAP */
.map-section{border-bottom:1px solid var(--bd)}
.map-bar{max-width:1200px;margin:0 auto;padding:16px 20px 10px;display:flex;align-items:center;justify-content:space-between}
.map-title{font-size:11px;font-weight:600;letter-spacing:.35em;color:var(--t2);text-transform:uppercase}
.map-hint{font-size:10px;color:var(--t3);letter-spacing:.04em}
#map{height:320px;width:100%;background:var(--bg3)}

/* SECTION */
.section{max-width:1200px;margin:0 auto;padding:0 20px}
.sec-head{display:flex;align-items:center;justify-content:space-between;padding:32px 0 16px}
.sec-title{font-size:11px;font-weight:600;letter-spacing:.35em;color:var(--t2);text-transform:uppercase}
.sec-count{font-size:11px;color:var(--t3);letter-spacing:.08em}

/* SHOP GRID */
.shop-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:16px;padding-bottom:64px}
.shop-card{background:#fff;border:1.5px solid var(--bd);border-radius:10px;overflow:hidden;cursor:pointer;transition:box-shadow .2s,transform .15s,border-color .18s}
.shop-card:hover{box-shadow:var(--sh-h);transform:translateY(-2px);border-color:rgba(255,20,147,.3)}
.shop-photo{height:140px;display:flex;align-items:flex-end;position:relative;overflow:hidden}
.shop-cat-label{font-size:9px;letter-spacing:.16em;padding:3px 10px;margin:0 12px 12px;background:rgba(255,255,255,.92);border-radius:20px;color:var(--t1);font-weight:600;border:1px solid rgba(0,0,0,.08)}
.shop-body{padding:14px 16px 16px}
.shop-name{font-size:13px;font-weight:700;letter-spacing:.03em;line-height:1.3;margin-bottom:4px;color:var(--t1)}
.shop-area{font-size:10px;color:var(--t3);letter-spacing:.06em;margin-bottom:8px}
.shop-tags{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px}
.tag{font-size:9px;letter-spacing:.04em;padding:3px 8px;border-radius:10px;border:1px solid var(--bd);color:var(--t2);background:var(--bg2)}
.shop-info{font-size:10px;color:var(--t2);line-height:1.8;margin-bottom:10px;border-top:1px solid var(--bd);padding-top:10px}
.shop-info span{display:block}
.shop-desc{font-size:11px;color:var(--t2);line-height:1.75;margin-bottom:10px}
.shop-ig{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:6px;border:1.5px solid var(--bd2);color:var(--t2);font-size:10px;font-weight:500;letter-spacing:.08em;transition:all .18s}
.shop-ig:hover{border-color:var(--pk);color:var(--pk)}
.ig-svg{width:13px;height:13px;fill:currentColor;flex-shrink:0}

/* GRADIENTS */
.g-cafe{background:linear-gradient(135deg,#fde8d8,#ffd8e8,#f5e8f0)}
.g-food{background:linear-gradient(135deg,#fef0d0,#ffe0c8,#fde8c0)}
.g-hair{background:linear-gradient(135deg,#f0d8ff,#e8d0f8,#f8d8ff)}
.g-gym {background:linear-gradient(135deg,#d8eeff,#dce8f8,#d8f0ff)}
.g-shop{background:linear-gradient(135deg,#dce8ff,#e0d8ff,#e8e0ff)}
.g-other{background:linear-gradient(135deg,#e8f0e8,#dce8dc,#e8ece8)}

/* FOOTER */
footer{background:var(--t1);padding:36px 20px;text-align:center}
.ft-logo{font-size:15px;font-weight:700;letter-spacing:.06em;margin-bottom:6px;color:#fff}
.ft-logo span{color:var(--pk)}
.ft-sub{font-size:9px;letter-spacing:.22em;color:#555;margin-bottom:8px;text-transform:uppercase}
.ft-hash{font-size:10px;color:#333;letter-spacing:.06em}
.empty{grid-column:1/-1;text-align:center;padding:64px 20px;color:var(--t3);font-size:12px;letter-spacing:.1em}

/* RESPONSIVE */
@media(max-width:768px){
  .nav-search{display:none}
  .hero{padding:40px 16px 32px}
  .hero h1{font-size:28px}
  .hero-desc{font-size:12px}
  .shop-grid{grid-template-columns:1fr 1fr;gap:10px;padding-bottom:48px}
  .shop-photo{height:110px}
  .shop-name{font-size:12px}
  .stats-strip{gap:20px}
  #map{height:260px}
  .sponsor-row{gap:10px}
}
@media(max-width:480px){
  .shop-grid{grid-template-columns:1fr;gap:10px}
  .cat-pill{font-size:12px;padding:8px 16px}
  .shop-photo{height:160px}
  .shop-card{border-radius:8px}
  .hero-box input{font-size:14px}
}
</style>
</head>

  html:`<div style="width:26px;height:26px;border-radius:50%;background:#FF1493;border:3px solid #fff;box-shadow:0 2px 8px rgba(255,20,147,.5);display:flex;align-items:center;justify-content:center"><svg width="10" height="10" viewBox="0 0 24 24" fill="white"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg></div>`,
  iconSize:[26,26],iconAnchor:[13,13],popupAnchor:[0,-15]
});

const map=L.map('map',{zoomControl:true}).setView([34.693,135.502],11);
L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',{
  attribution:'&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> &copy; <a href="https://carto.com/attributions">CARTO</a>',
  subdomains:'abcd',maxZoom:19
}).addTo(map);

let markers=[];
function renderMap(stores){
  markers.forEach(m=>map.removeLayer(m));
  markers=[];
  stores.forEach(s=>{
    const m=L.marker([s.lat,s.lng],{icon:pinkIcon})
      .bindPopup(`<div style="font-family:'Noto Sans JP',sans-serif"><b style="font-size:13px;color:#111">${s.name}</b><br><span style="font-size:10px;color:#777">${s.area} &middot; ${s.cat}</span></div>`)
      .addTo(map);
    markers.push(m);
  });
  if(stores.length){
    try{map.fitBounds(L.featureGroup(markers).getBounds().pad(0.15));}catch(e){}
  }
}

function renderGrid(){
  const items=filtered();
  document.getElementById('gridCount').textContent=items.length+' 件';
  const grid=document.getElementById('shopGrid');
  if(!items.length){
    grid.innerHTML='<div class="empty">該当する店舗は見つかりませんでした。</div>';
    renderMap([]);
    return;
  }
  grid.innerHTML=items.map(s=>`
    <div class="shop-card">
      <div class="shop-photo ${s.bg}">
        <span class="shop-cat-label">${s.cat}</span>
      </div>
      <div class="shop-body">
        <div class="shop-name">${s.name}</div>
        <div class="shop-area">${s.area}</div>
        <div class="shop-tags">${s.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div>
        ${(s.hours||s.holiday||s.addr)?`<div class="shop-info">
          ${s.addr?`<span>📍 ${s.addr}</span>`:''}
          ${s.hours?`<span>🕐 ${s.hours}</span>`:''}
          ${s.holiday?`<span>定休日: ${s.holiday}</span>`:''}
        </div>`:''}
      </div>
    </div>
  `).join('');
  renderMap(items);
}

// スポンサー
(function(){
  const band=document.getElementById('sponsorBand');
  const row=document.getElementById('sponsorRow');
  if(!SPONSORS.length) return;
  band.style.display='block';
  row.innerHTML=SPONSORS.map(s=>`
    <div class="sponsor-card">
      <span class="sponsor-badge">SPONSOR</span>
      <div><div class="sponsor-name">${s.name}</div><div class="sponsor-cat">${s.cat} &middot; ${s.area}</div></div>
    </div>
  `).join('');
})();

// Stats
document.getElementById('sTotal').textContent=STORES.length;
document.getElementById('sArea').textContent=new Set(STORES.map(s=>s.region)).size;
const days=Math.ceil((new Date('2026-08-08')-new Date())/86400000);
document.getElementById('sDays').textContent=days>0?days:0;

// Filters
document.querySelectorAll('.cat-pill').forEach(b=>{
  b.addEventListener('click',()=>{
    document.querySelectorAll('.cat-pill').forEach(x=>x.classList.remove('on'));
    b.classList.add('on'); activeCat=b.dataset.cat; renderGrid();
  });
});
document.querySelectorAll('.area-pill').forEach(b=>{
  b.addEventListener('click',()=>{
    document.querySelectorAll('.area-pill').forEach(x=>x.classList.remove('on'));
    b.classList.add('on'); activeRegion=b.dataset.region; renderGrid();
  });
});
document.getElementById('navQ').addEventListener('input',e=>{searchQ=e.target.value;renderGrid();});
document.getElementById('heroQ').addEventListener('input',e=>{searchQ=e.target.value;renderGrid();});
document.getElementById('navBtn').addEventListener('click',()=>{
  searchQ=document.getElementById('navQ').value;
  renderGrid();
  document.getElementById('all').scrollIntoView({behavior:'smooth'});
});
document.getElementById('heroBtn').addEventListener('click',()=>{
  searchQ=document.getElementById('heroQ').value;
  renderGrid();
  document.getElementById('all').scrollIntoView({behavior:'smooth'});
});

renderGrid();
</script>
