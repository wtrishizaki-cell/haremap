<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ハレマップ — HARE COLLECTION 2026 協力店舗</title>
<meta name="description" content="HARE COLLECTION 2026 の活動に参加する協力店舗を紹介するサイトです。カフェ・セレクトショップ・美容室・ギャラリーなど、大阪・京都・神戸エリアから検索できます。">
<meta property="og:title" content="ハレマップ — HARE COLLECTION 2026 協力店舗">
<meta property="og:description" content="HARE COLLECTION 2026 の協力店舗をエリアやカテゴリから検索できます。">
<meta property="og:type" content="website">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --pk:#FF1493;--pk2:#d60f7d;
  --bg:#000;--bg2:#0a0a0a;--bg3:#111;
  --bd:#1e1e1e;--bd2:#2a2a2a;
  --t1:#fff;--t2:#999;--t3:#444;
  --card:rgba(255,255,255,0.03);
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--t1);font-family:'Montserrat','Noto Sans JP',sans-serif}
a{text-decoration:none;color:inherit}
button{cursor:pointer;font-family:inherit}

/* ── NAV ── */
.nav{
  position:sticky;top:0;z-index:100;
  background:rgba(0,0,0,.97);backdrop-filter:blur(12px);
  border-bottom:1px solid var(--bd);
}
.nav-inner{
  max-width:1280px;margin:0 auto;padding:0 24px;
  height:60px;display:flex;align-items:center;gap:20px;
}
.nav-logo{font-size:20px;font-weight:700;letter-spacing:.06em;white-space:nowrap}
.nav-logo span{color:var(--pk)}
.nav-search{
  flex:1;max-width:460px;
  display:flex;border:1px solid var(--bd2);
  background:var(--bg3);
}
.nav-search input{
  flex:1;background:transparent;border:none;
  padding:0 14px;font-size:12px;color:var(--t1);
  font-family:inherit;outline:none;letter-spacing:.04em;
}
.nav-search input::placeholder{color:var(--t3)}
.nav-search button{
  padding:0 18px;background:var(--pk);border:none;
  color:#fff;font-size:11px;font-weight:600;letter-spacing:.1em;
  transition:background .2s;
}
.nav-search button:hover{background:var(--pk2)}

/* ── HERO ── */
.hero{
  background:linear-gradient(180deg,#080005 0%,#000 100%);
  border-bottom:1px solid var(--bd);
  padding:72px 24px 56px;
  text-align:center;
  position:relative;overflow:hidden;
}
.hero::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse 55% 45% at 50% 0%,rgba(255,20,147,.07) 0%,transparent 70%);
  pointer-events:none;
}
.hero-eyebrow{
  display:inline-block;
  font-size:10px;letter-spacing:.45em;color:var(--pk);
  border:1px solid rgba(255,20,147,.3);
  padding:5px 20px;margin-bottom:28px;text-transform:uppercase;
}
.hero h1{
  font-size:clamp(30px,4.5vw,52px);font-weight:700;
  letter-spacing:.04em;margin-bottom:16px;line-height:1.2;
}
.hero h1 em{color:var(--pk);font-style:normal}
.hero-desc{
  font-size:13px;color:var(--t2);letter-spacing:.06em;
  margin-bottom:40px;line-height:1.9;
}
.hero-box{
  max-width:560px;margin:0 auto 32px;
  display:flex;border:1px solid var(--bd2);
  background:var(--bg3);
}
.hero-box input{
  flex:1;background:transparent;border:none;
  padding:14px 20px;font-size:13px;color:var(--t1);
  font-family:inherit;outline:none;letter-spacing:.04em;
}
.hero-box input::placeholder{color:var(--t3)}
.hero-box button{
  padding:0 28px;background:var(--pk);border:none;
  color:#fff;font-size:12px;font-weight:600;letter-spacing:.12em;
  transition:background .2s;white-space:nowrap;
}
.hero-box button:hover{background:var(--pk2)}
.cat-row{display:flex;flex-wrap:wrap;gap:8px;justify-content:center}
.cat-pill{
  padding:7px 18px;
  background:transparent;border:1px solid var(--bd2);
  color:var(--t2);font-size:11px;font-weight:400;
  letter-spacing:.08em;transition:all .2s;
}
.cat-pill:hover,.cat-pill.on{
  background:var(--pk);border-color:var(--pk);color:#fff;
}

/* ── AREA NAV ── */
.area-nav{
  background:var(--bg2);border-bottom:1px solid var(--bd);
  padding:12px 24px;overflow-x:auto;
}
.area-nav::-webkit-scrollbar{display:none}
.area-nav-inner{
  max-width:1280px;margin:0 auto;
  display:flex;align-items:center;gap:8px;white-space:nowrap;
}
.area-label{font-size:9px;letter-spacing:.25em;color:var(--t3);text-transform:uppercase;margin-right:6px;flex-shrink:0}
.area-pill{
  padding:5px 14px;
  background:transparent;border:1px solid var(--bd2);
  color:var(--t3);font-size:11px;letter-spacing:.06em;
  transition:all .2s;flex-shrink:0;
}
.area-pill:hover,.area-pill.on{background:var(--bg3);border-color:var(--bd2);color:var(--t1)}

/* ── STATS ── */
.stats-strip{
  background:var(--bg3);border-bottom:1px solid var(--bd);
  padding:20px 24px;
  display:flex;justify-content:center;gap:60px;
}
.sstat{text-align:center}
.sstat-n{font-size:30px;font-weight:700;line-height:1;margin-bottom:5px}
.sstat-n.p{color:var(--pk)}
.sstat-l{font-size:9px;letter-spacing:.3em;color:var(--t3);text-transform:uppercase}

/* ── SECTION ── */
.section{max-width:1280px;margin:0 auto;padding:0 24px}
.sec-head{
  display:flex;align-items:baseline;justify-content:space-between;
  margin-bottom:20px;padding-top:52px;
}
.sec-title{font-size:11px;font-weight:600;letter-spacing:.4em;color:var(--t2);text-transform:uppercase}
.sec-count{font-size:11px;color:var(--t3);letter-spacing:.1em}
.see-all{font-size:11px;color:var(--pk);letter-spacing:.12em;transition:opacity .2s}
.see-all:hover{opacity:.65}

/* ── FEATURED ── */
.featured-wrap{overflow-x:auto;padding-bottom:4px;scrollbar-width:none}
.featured-wrap::-webkit-scrollbar{display:none}
.featured-row{display:flex;gap:16px;width:max-content}
.feat-card{
  width:280px;flex-shrink:0;
  background:var(--card);border:1px solid var(--bd);
  border-top:2px solid var(--pk);
  overflow:hidden;transition:border-color .2s,transform .2s;cursor:pointer;
}
.feat-card:hover{transform:translateY(-2px)}
.feat-photo{
  height:160px;width:100%;
  display:flex;align-items:center;justify-content:center;
  position:relative;font-size:9px;letter-spacing:.3em;color:rgba(255,255,255,.06);
  text-transform:uppercase;overflow:hidden;
}
.feat-photo::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(to bottom,transparent 40%,rgba(0,0,0,.8));
}
.feat-plan{
  position:absolute;top:12px;left:12px;z-index:1;
  font-size:8px;letter-spacing:.25em;padding:3px 9px;
  background:var(--pk);color:#fff;
}
.feat-body{padding:16px}
.feat-name{font-size:14px;font-weight:600;margin-bottom:7px;letter-spacing:.03em;line-height:1.3}
.feat-meta{font-size:10px;color:var(--t3);letter-spacing:.06em;margin-bottom:10px;display:flex;gap:10px}
.feat-desc{font-size:11px;color:var(--t2);line-height:1.75;letter-spacing:.02em;margin-bottom:14px}
.feat-link{
  display:inline-flex;align-items:center;gap:5px;
  padding:6px 14px;border:1px solid var(--bd2);
  color:var(--t2);font-size:10px;font-weight:500;letter-spacing:.1em;
  transition:all .2s;
}
.feat-link:hover{border-color:var(--pk);color:var(--pk)}

/* ── SHOP GRID ── */
.shop-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
  gap:1px;
  border:1px solid var(--bd);
  padding-bottom:64px;
}
.shop-card{
  background:var(--card);
  overflow:hidden;cursor:pointer;
  transition:background .2s;
  border:none;
}
.shop-card:hover{background:rgba(255,255,255,.05)}
.shop-card.premium{border-top:2px solid var(--pk)}
.shop-photo{
  height:140px;
  display:flex;align-items:center;justify-content:center;
  font-size:9px;letter-spacing:.3em;color:rgba(255,255,255,.06);
  text-transform:uppercase;position:relative;overflow:hidden;
}
.shop-photo::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(to bottom,transparent 40%,rgba(0,0,0,.72));
}
.shop-cat-label{
  position:absolute;bottom:10px;left:12px;z-index:1;
  font-size:9px;letter-spacing:.2em;padding:2px 8px;
  background:rgba(0,0,0,.65);border:1px solid rgba(255,255,255,.08);color:var(--t2);
  text-transform:uppercase;
}
.shop-body{padding:16px 18px}
.shop-head{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px}
.shop-name{font-size:13px;font-weight:600;letter-spacing:.04em;line-height:1.35}
.shop-plan-badge{
  font-size:8px;letter-spacing:.18em;padding:3px 8px;
  margin-left:8px;margin-top:1px;flex-shrink:0;
}
.badge-premium{background:var(--pk);color:#fff}
.badge-free{border:1px solid #222;color:#333}
.shop-area{font-size:10px;color:var(--t3);letter-spacing:.06em;margin-bottom:10px}
.shop-tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.tag{font-size:9px;letter-spacing:.06em;padding:3px 8px;border:1px solid var(--bd);color:var(--t3)}
.shop-restricted{
  font-size:10px;color:var(--t3);letter-spacing:.06em;
  border-top:1px solid var(--bd);padding-top:10px;margin-top:2px;
  line-height:1.6;
}
.shop-restricted a{color:rgba(255,20,147,.35);transition:color .2s}
.shop-restricted a:hover{color:var(--pk)}

/* ── FOOTER ── */
footer{padding:44px 24px;border-top:1px solid var(--bd);text-align:center}
.ft-line{width:100%;height:1px;background:linear-gradient(90deg,transparent,var(--pk),transparent);margin-bottom:24px}
.ft-logo{font-size:14px;font-weight:700;letter-spacing:.06em;margin-bottom:8px}
.ft-logo span{color:var(--pk)}
.ft-sub{font-size:9px;letter-spacing:.25em;color:var(--t3);margin-bottom:12px;text-transform:uppercase}
.ft-hash{font-size:10px;color:#222;letter-spacing:.06em}

/* ── PHOTO GRADIENTS ── */
.g-cafe{background:linear-gradient(135deg,#1a0d06,#0a0808,#100d00)}
.g-shop{background:linear-gradient(135deg,#050a1a,#0a0010,#0a0a0a)}
.g-hair{background:linear-gradient(135deg,#0d001a,#1a0010,#000010)}
.g-gall{background:linear-gradient(135deg,#0a0a0a,#050505,#100010)}
.g-nail{background:linear-gradient(135deg,#1a000a,#0a0010,#000815)}
.g-food{background:linear-gradient(135deg,#0a0a00,#100805,#0a0005)}
.g-rec {background:linear-gradient(135deg,#001010,#000a0a,#051010)}
.g-life{background:linear-gradient(135deg,#080808,#0a050a,#05050a)}

/* ── RESPONSIVE ── */
@media(max-width:768px){
  .nav-search{display:none}
  .hero h1{font-size:28px}
  .shop-grid{grid-template-columns:1fr 1fr}
  .stats-strip{gap:28px}
}
@media(max-width:480px){
  .shop-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>

<!-- NAV -->
<nav class="nav">
  <div class="nav-inner">
    <a href="index.html" class="nav-logo">ハレ<span>マップ</span></a>
    <div class="nav-search">
      <input type="text" placeholder="店舗名、エリア、カテゴリで検索">
      <button>検索</button>
    </div>
  </div>
</nav>

<!-- HERO -->
<section class="hero">
  <div class="hero-eyebrow">HARE COLLECTION 2026 — 協力店舗マップ</div>
  <h1>街を、もっと<em>ハレ</em>に。</h1>
  <p class="hero-desc">
    HARE COLLECTION 2026 の活動に参加する協力店舗を紹介するサイトです。<br>
    エリアやカテゴリから検索してください。
  </p>
  <div class="hero-box">
    <input type="text" placeholder="店舗名、エリア、カテゴリで検索">
    <button>検索</button>
  </div>
  <div class="cat-row" id="catRow">
    <button class="cat-pill on"  data-cat="">すべて</button>
    <button class="cat-pill" data-cat="カフェ">カフェ</button>
    <button class="cat-pill" data-cat="セレクトショップ">ショップ</button>
    <button class="cat-pill" data-cat="美容室">美容室</button>
    <button class="cat-pill" data-cat="ギャラリー">ギャラリー</button>
    <button class="cat-pill" data-cat="ネイルサロン">ネイル</button>
    <button class="cat-pill" data-cat="飲食">飲食</button>
  </div>
</section>

<!-- AREA NAV -->
<div class="area-nav">
  <div class="area-nav-inner">
    <span class="area-label">Area</span>
    <button class="area-pill on" data-area="">すべてのエリア</button>
    <button class="area-pill" data-area="大阪市西区">大阪市西区</button>
    <button class="area-pill" data-area="大阪市北区">大阪市北区</button>
    <button class="area-pill" data-area="大阪市中央区">大阪市中央区</button>
    <button class="area-pill" data-area="大阪市天王寺区">天王寺区</button>
    <button class="area-pill" data-area="京都市">京都市</button>
    <button class="area-pill" data-area="神戸市">神戸市</button>
  </div>
</div>

<!-- STATS -->
<div class="stats-strip">
  <div class="sstat"><div class="sstat-n" id="sTotal">15</div><div class="sstat-l">Listed Stores</div></div>
  <div class="sstat"><div class="sstat-n p" id="sPrem">4</div><div class="sstat-l">Premium</div></div>
  <div class="sstat"><div class="sstat-n" id="sArea">6</div><div class="sstat-l">Areas</div></div>
  <div class="sstat"><div class="sstat-n p" id="sDays">46</div><div class="sstat-l">Days to 8/8</div></div>
</div>

<!-- FEATURED -->
<div class="section">
  <div class="sec-head">
    <div class="sec-title">Premium Partner</div>
    <a href="#all" class="see-all">すべて表示</a>
  </div>
</div>
<div style="padding:0 24px;max-width:1280px;margin:0 auto">
  <div class="featured-wrap">
    <div class="featured-row" id="featRow"></div>
  </div>
</div>

<!-- ALL SHOPS -->
<div class="section" id="all">
  <div class="sec-head">
    <div class="sec-title">掲載店舗一覧</div>
    <div class="sec-count" id="gridCount">15 件</div>
  </div>
</div>
<div style="max-width:1280px;margin:0 auto;padding:0 24px 0">
  <div class="shop-grid" id="shopGrid"></div>
</div>

<!-- FOOTER -->
<footer>
  <div class="ft-line"></div>
  <div class="ft-logo">ハレ<span>マップ</span></div>
  <div class="ft-sub">HARE COLLECTION 2026 — 2026.08.08 OSAKA</div>
  <div class="ft-hash">#HARECOLLECTION2026 &nbsp; #ハレコレ2026 &nbsp; #ハレマップ</div>
</footer>

<script>
const STORES = [
  { id:1,  slug:"select-shop-void",      name:"SELECT SHOP VOID",       area:"大阪市西区",    cat:"セレクトショップ", plan:"premium", desc:"ヴィンテージとモダンが融合するセレクトショップ。HAREの世界観と高い親和性を持つ。",   ig:"https://www.instagram.com", tags:["セレクト","メンズ","レディース"], bg:"g-shop" },
  { id:2,  slug:"cafe-lumiere",          name:"CAFÉ LUMIÈRE",            area:"大阪市北区",    cat:"カフェ",           plan:"premium", desc:"洗練された空間と珈琲が自慢のデザインカフェ。深夜まで営業。",                         ig:"https://www.instagram.com", tags:["コーヒー","デザイン","深夜営業"], bg:"g-cafe" },
  { id:3,  slug:"hair-salon-noir",       name:"HAIR SALON NOIR",         area:"大阪市中央区",  cat:"美容室",           plan:"premium", desc:"アートとファッションをコンセプトにしたヘアサロン。",                                   ig:"https://www.instagram.com", tags:["ヘアカラー","デザイン","アート"], bg:"g-hair" },
  { id:4,  slug:"gallery-mono",          name:"GALLERY MONO",            area:"大阪市西区",    cat:"ギャラリー",       plan:"premium", desc:"現代アートギャラリー。若手アーティストの作品を継続的に紹介する。",                    ig:"https://www.instagram.com", tags:["アート","展示","イベント"], bg:"g-gall" },
  { id:5,  slug:"book-cafe-buncho",      name:"BOOK CAFÉ 文鳥",          area:"大阪市西区",    cat:"カフェ",           plan:"free",    desc:"", ig:"", tags:["カフェ","書籍"], bg:"g-cafe" },
  { id:6,  slug:"vintage-market-zen",    name:"VINTAGE MARKET 然",       area:"大阪市北区",    cat:"セレクトショップ", plan:"free",    desc:"", ig:"", tags:["古着","ヴィンテージ"], bg:"g-shop" },
  { id:7,  slug:"nail-beauty-lace",      name:"NAIL & BEAUTY LACE",      area:"大阪市中央区",  cat:"ネイルサロン",     plan:"free",    desc:"", ig:"", tags:["ネイル","美容"], bg:"g-nail" },
  { id:8,  slug:"ramen-atelier-koku",    name:"RAMEN ATELIER 黒",        area:"大阪市天王寺区",cat:"飲食",             plan:"free",    desc:"", ig:"", tags:["ラーメン","こだわり"], bg:"g-food" },
  { id:9,  slug:"second-hand-blvd",      name:"SECOND HAND BLVD",        area:"京都市",        cat:"セレクトショップ", plan:"free",    desc:"", ig:"", tags:["古着","京都"], bg:"g-shop" },
  { id:10, slug:"photo-studio-prism",    name:"PHOTO STUDIO PRISM",      area:"大阪市北区",    cat:"フォトスタジオ",   plan:"free",    desc:"", ig:"", tags:["撮影","スタジオ"], bg:"g-gall" },
  { id:11, slug:"piercing-jewelry-dark", name:"PIERCING & JEWELRY dark",  area:"大阪市中央区",  cat:"ジュエリー",       plan:"free",    desc:"", ig:"", tags:["ピアス","アクセサリー"], bg:"g-nail" },
  { id:12, slug:"lifestyle-store-arch",  name:"LIFESTYLE STORE ARCH",    area:"神戸市",        cat:"ライフスタイル",   plan:"free",    desc:"", ig:"", tags:["ライフスタイル","雑貨"], bg:"g-life" },
  { id:13, slug:"barber-edge",           name:"BARBER EDGE",             area:"大阪市北区",    cat:"理容室",           plan:"free",    desc:"", ig:"", tags:["バーバー","メンズ"], bg:"g-hair" },
  { id:14, slug:"tattoo-studio-ink",     name:"TATTOO STUDIO INK",       area:"大阪市西区",    cat:"タトゥースタジオ", plan:"free",    desc:"", ig:"", tags:["タトゥー","アート"], bg:"g-gall" },
  { id:15, slug:"record-shop-signal",    name:"RECORD SHOP SIGNAL",      area:"大阪市天王寺区",cat:"レコードショップ", plan:"free",    desc:"", ig:"", tags:["レコード","音楽"], bg:"g-rec"  },
];

let activeCat = '', activeArea = '', searchQ = '';

function filtered() {
  return STORES.filter(s => {
    if (activeCat && s.cat !== activeCat) return false;
    if (activeArea && s.area !== activeArea) return false;
    if (searchQ) {
      const q = searchQ.toLowerCase();
      if (!s.name.toLowerCase().includes(q) && !s.area.includes(q) && !s.cat.includes(q)) return false;
    }
    return true;
  });
}

function renderFeatured() {
  const row = document.getElementById('featRow');
  row.innerHTML = STORES.filter(s => s.plan === 'premium').map(s => `
    <a href="shop/${s.slug}.html" class="feat-card">
      <div class="feat-photo ${s.bg}">
        <span class="feat-plan">PREMIUM</span>
        <span style="z-index:1;position:relative">PHOTO</span>
      </div>
      <div class="feat-body">
        <div class="feat-name">${s.name}</div>
        <div class="feat-meta"><span>${s.area}</span><span>${s.cat}</span></div>
        <div class="feat-desc">${s.desc}</div>
        <span class="feat-link">Instagram を見る</span>
      </div>
    </a>
  `).join('');
}

function renderGrid() {
  const grid = document.getElementById('shopGrid');
  const items = filtered().sort((a,b) => (a.plan==='premium'?0:1)-(b.plan==='premium'?0:1));
  document.getElementById('gridCount').textContent = items.length + ' 件';
  if (!items.length) {
    grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:64px;color:#333;font-size:12px;letter-spacing:.12em">該当する店舗は見つかりませんでした。</div>';
    return;
  }
  grid.innerHTML = items.map(s => {
    const ip = s.plan === 'premium';
    return `<a href="shop/${s.slug}.html" class="shop-card${ip?' premium':''}">
      <div class="shop-photo ${s.bg}">
        <span class="shop-cat-label">${s.cat}</span>
      </div>
      <div class="shop-body">
        <div class="shop-head">
          <div class="shop-name">${s.name}</div>
          <span class="shop-plan-badge ${ip?'badge-premium':'badge-free'}">${ip?'PREMIUM':'FREE'}</span>
        </div>
        <div class="shop-area">${s.area}</div>
        <div class="shop-tags">${s.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div>
        ${ip
          ? `<span class="feat-link" style="font-size:10px;padding:5px 12px;border:1px solid var(--bd2);color:var(--t2);display:inline-block;letter-spacing:.1em">Instagram を見る</span>`
          : `<div class="shop-restricted">詳細情報はプレミアムプランにてご覧いただけます。<br><a href="#">プレミアムプランについて</a></div>`
        }
      </div>
    </a>`;
  }).join('');
}

// Stats
document.getElementById('sTotal').textContent = STORES.length;
document.getElementById('sPrem').textContent  = STORES.filter(s=>s.plan==='premium').length;
document.getElementById('sArea').textContent  = new Set(STORES.map(s=>s.area)).size;
document.getElementById('sDays').textContent  = Math.ceil((new Date('2026-08-08')-new Date())/86400000);

// Filters
document.querySelectorAll('.cat-pill').forEach(b => {
  b.addEventListener('click', () => {
    document.querySelectorAll('.cat-pill').forEach(x=>x.classList.remove('on'));
    b.classList.add('on'); activeCat = b.dataset.cat; renderGrid();
  });
});
document.querySelectorAll('.area-pill').forEach(b => {
  b.addEventListener('click', () => {
    document.querySelectorAll('.area-pill').forEach(x=>x.classList.remove('on'));
    b.classList.add('on'); activeArea = b.dataset.area; renderGrid();
  });
});
['.nav-search input','.hero-box input'].forEach(sel => {
  document.querySelectorAll(sel).forEach(el => {
    el.addEventListener('input', e => { searchQ = e.target.value; renderGrid(); });
  });
});
['.nav-search button','.hero-box button'].forEach(sel => {
  document.querySelectorAll(sel).forEach(el => {
    el.addEventListener('click', () => document.getElementById('all').scrollIntoView({behavior:'smooth'}));
  });
});

renderFeatured();
renderGrid();
</script>
</body>
</html>
